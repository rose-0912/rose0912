<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタジオ猫 - 回せるシナリオ</title>
    <style>
        body { font-family: sans-serif; background-color: #f3effa; color: #3b3543; margin: 0; padding: 0; min-height: 100vh; }
        .container { max-width: 850px; margin: 30px auto; padding: 30px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(142, 124, 171, 0.1); }
        header { text-align: center; border-bottom: 2px solid #b3a2cb; padding-bottom: 20px; margin-bottom: 30px; }
        .header-cat { display: block; width: 45px; height: 45px; margin: 0 auto 5px auto; object-fit: contain; }
        h1 { margin: 0; font-size: 28px; color: #6c528d; }
        .subtitle { font-size: 14px; color: #8e7cab; margin: 5px 0 0 0; }
        nav { text-align: center; margin-bottom: 20px; }
        nav a { margin: 0 8px; color: #8261ad; text-decoration: none; font-size: 14px; font-weight: bold; }
        nav a.active { color: #4a148c; border-bottom: 2px solid #4a148c; }
        h2 { font-size: 20px; border-left: 5px solid #9d81ba; padding-left: 12px; margin-top: 40px; color: #513971; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #e1daf0; padding: 12px 10px; font-size: 14px; }
        th { background-color: #fbf9fe; color: #513971; }
        .badge { display: inline-block; padding: 2px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; color: white; }
        .bg-coc6 { background-color: #6c528d; }
        .bg-coc7 { background-color: #8e7cab; }
        .bg-emo { background-color: #d81b60; }
        .bg-other { background-color: #9d81ba; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>スタジオ猫</h1>
        <p class="subtitle">TRPG Profile & Tools</p>
    </header>

    <nav>
        <a href="index.html">自己紹介</a> | 
        <a href="rules.html">ハウスルール</a> | 
        <a href="scenarios.html">通過シナリオ</a> | 
        <a href="owned-scenarios.html" class="active">回せるシナリオ</a>
    </nav>
    
    <section>
        <h2>KP/GM可能シナリオ一覧</h2>
        <p>いつでもGMのお誘いお待ちしております！日程や人数はご相談ください。</p>
        <table id="owned-table">
            <thead>
                <tr>
                    <th>システム</th>
                    <th>シナリオ名</th>
                    <th>人数</th>
                    <th>目安時間</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="4" style="text-align:center;">読み込み中...🐾</td></tr>
            </tbody>
        </table>
    </section>
</div>

<script>
    // ★ここに取得したウェブアプリのURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw8dK9X0XPCuzfBgh2Fg901u4zotBDWmiWjn9s0mPjIkc0l2qdOUGDcyXDQDET7IR4/exec";

    async function loadScenarios() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";

            data.forEach(item => {
                const row = document.createElement("tr");
                const titleDisplay = item.url ? `<a href="${item.url}" target="_blank">${item.title} 🔗</a>` : item.title;
                
                row.innerHTML = `
                    <td>${getSystemBadge(item.system)}</td>
                    <td>${titleDisplay}</td>
                    <td>${item.players}</td>
                    <td>${item.time}</td>
                `;
                tbody.appendChild(row);
            });
        } catch (e) {
            document.getElementById("table-body").innerHTML = "<tr><td colspan='4'>読み込みエラーが発生しました🐾</td></tr>";
        }
    }

    function getSystemBadge(system) {
        if (system === "クトゥルフ神話TRPG") return `<span class="badge bg-coc6">CoC6版</span>`;
        if (system === "新クトゥルフ神話TRPG") return `<span class="badge bg-coc7">CoC7版</span>`;
        if (system === "エモクロアTRPG") return `<span class="badge bg-emo">エモクロア</span>`;
        return `<span class="badge bg-other">その他</span>`;
    }

    window.onload = loadScenarios;
</script>

</body>
</html>
