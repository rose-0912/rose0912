<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタジオ猫 - 通過シナリオ</title>
    <style>
        body { font-family: sans-serif; background-color: #f3effa; color: #3b3543; margin: 0; padding: 0; position: relative; overflow-x: hidden; min-height: 100vh; }
        .container { max-width: 850px; margin: 30px auto 250px auto; padding: 30px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(142, 124, 171, 0.1); position: relative; z-index: 2; }
        header { text-align: center; border-bottom: 2px solid #b3a2cb; padding-bottom: 20px; margin-bottom: 30px; }
        .header-cat { display: block; width: 45px; height: 45px; margin: 0 auto 5px auto; object-fit: contain; }
        h1 { margin: 0; font-size: 28px; letter-spacing: 0.08em; color: #6c528d; }
        .subtitle { font-size: 14px; color: #8e7cab; margin: 5px 0 0 0; }
        nav { text-align: center; margin-bottom: 20px; }
        nav a { margin: 0 8px; color: #8261ad; text-decoration: none; font-size: 14px; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        nav a.active { color: #4a148c; border-bottom: 2px solid #4a148c; padding-bottom: 2px; }
        h2 { font-size: 20px; border-left: 5px solid #9d81ba; padding-left: 12px; margin-top: 40px; margin-bottom: 20px; color: #513971; position: relative; z-index: 1; }
        h2::after { content: "🐾"; position: absolute; left: -22px; top: -55px; color: rgba(157, 129, 186, 0.12); font-size: 80px; transform: rotate(-15deg); pointer-events: none; z-index: -1; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 30px; }
        th, td { border: 1px solid #e1daf0; padding: 12px 10px; text-align: left; font-size: 14px; line-height: 1.5; }
        th { background-color: #fbf9fe; color: #513971; font-weight: bold; white-space: nowrap; }
        .walking-cat { position: fixed; bottom: -50px; left: -550px; width: 500px; height: 500px; z-index: 1; pointer-events: none; transform: scaleX(-1); animation: catWalkMega 40s infinite linear; object-fit: contain; }
        @keyframes catWalkMega { 0% { left: -550px; } 85% { left: 100vw; } 100% { left: 100vw; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="cat.png" alt="猫" class="header-cat">
        <h1>スタジオ猫</h1>
        <p class="subtitle">TRPG Profile & Tools</p>
    </header>

    <nav>
        <a href="index.html">自己紹介</a> | 
        <a href="rules.html">ハウスルール</a> | 
        <a href="scenarios.html" class="active">通過シナリオ</a> | 
        <a href="owned-scenarios.html">回せるシナリオ</a> | 
        <a href="dice.html">Webダイス</a>
    </nav>
    
    <section>
        <h2>通過シナリオ履歴</h2>
        <table id="scenario-table">
            <thead>
                <tr>
                    <th style="width: 25%;">システム</th>
                    <th style="width: 25%;">シナリオ名</th>
                    <th style="width: 13%;">PC</th>
                    <th style="width: 12%;">新規継続</th>
                    <th style="width: 12%;">生還ロスト</th>
                    <th style="width: 13%;">備考</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="6" style="text-align:center;">読み込み中...🐾</td></tr>
            </tbody>
        </table>
    </section>
</div>

<img src="cat.png" alt="歩く猫" class="walking-cat">

<script>
    // ★ここに取得したウェブアプリのURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyr5n9d3cqPDPgm6QKIQRb8CG2DYW1--uxAGvuQ_CcF0nw4Df3Xra3AG-F10HvHuxJo/exec";

    function loadScenarios() {
        const script = document.createElement('script');
        script.src = `${GAS_URL}?callback=callback`;
        document.body.appendChild(script);
    }

function callback(data) {
        const tbody = document.getElementById("table-body");
        tbody.innerHTML = "";
        
        data.forEach(item => {
            const row = document.createElement("tr");
            
            // 備考がURL形式かどうか判定して、リンクを可愛く表示する
            let noteDisplay = item.note || '-';
            if (item.note && item.note.startsWith('http')) {
                noteDisplay = `<a href="${item.note}" target="_blank" style="color: #8261ad; text-decoration: none; font-weight: bold;">🔗キャラシ</a>`;
            }

            row.innerHTML = `
                <td>${item.system || '-'}</td>
                <td>${item.title || '-'}</td>
                <td>${item.pc || '-'}</td>
                <td>${item.type || '-'}</td>
                <td>${item.status || '-'}</td>
                <td>${noteDisplay}</td>
            `;
            tbody.appendChild(row);
        });
    }

    window.onload = loadScenarios;
</script>

</body>
</html>
