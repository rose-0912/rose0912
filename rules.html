<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタジオ猫 - ハウスルール</title>
    <style>
        /* 全体のデザイン設定（薄紫と白が基調） */
        body { 
            font-family: sans-serif; 
            background-color: #f3effa; 
            color: #3b3543; 
            margin: 0; 
            padding: 0; 
            position: relative;
            overflow-x: hidden; 
            min-height: 100vh;
        }
        .container { 
            max-width: 800px; 
            margin: 30px auto 250px auto; /* 超巨大猫用の下部余白 */
            padding: 30px; 
            background: #ffffff; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(142, 124, 171, 0.1); 
            position: relative;
            z-index: 2; 
        }
        
        /* ヘッダーと猫APNG */
        header { 
            text-align: center; 
            border-bottom: 2px solid #b3a2cb; 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
            position: relative;
        }
        .header-cat {
            display: block;
            width: 45px;
            height: 45px;
            margin: 0 auto 5px auto;
            object-fit: contain;
        }
        h1 { margin: 0; font-size: 28px; letter-spacing: 0.08em; color: #6c528d; }
        .subtitle { font-size: 14px; color: #8e7cab; margin: 5px 0 0 0; }
        
        /* 見出しと【「ハ」の真裏に配置した巨大肉球スタンプ】 */
        h2 { 
            font-size: 20px; 
            border-left: 5px solid #9d81ba; 
            padding-left: 12px; 
            margin-top: 60px; 
            margin-bottom: 20px;
            color: #513971; 
            position: relative;
            z-index: 1; 
        }
        /* セクション内の小見出し */
        h3 {
            font-size: 16px;
            color: #6c528d;
            margin-top: 35px;
            margin-bottom: 15px;
            border-bottom: 1px dashed #b3a2cb;
            padding-bottom: 5px;
        }
        h2::after {
            content: "🐾";
            position: absolute;
            left: -22px;     
            top: -55px;      
            color: rgba(157, 129, 186, 0.12); 
            font-size: 80px; 
            transform: rotate(-15deg); 
            pointer-events: none;
            z-index: -1;     
        }

        /* 読みやすさのための改行・文章スタイル調整 */
        p {
            font-size: 15px;
            line-height: 1.8;
            margin: 15px 0;
        }
        ul { 
            padding-left: 20px; 
            margin: 15px 0; 
        }
        li { 
            margin-bottom: 16px; 
            font-size: 15px; 
            line-height: 1.8; 
        }
        /* 【改善】重要な文字のマーカー色を紫から薄黄色に変更して見やすく */
        li strong, p strong { 
            color: #222; 
            background: linear-gradient(transparent 50%, #fff9c4 50%); 
            padding: 0 2px;
        }
        
        /* テーブルの調整 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 30px; }
        th, td { border: 1px solid #e1daf0; padding: 14px; text-align: left; font-size: 14px; line-height: 1.6; }
        th { background-color: #fbf9fe; color: #513971; font-weight: bold; }
        
        /* 戦闘クリファン表スタイル */
        .battle-table th { background-color: #f3e5f5; text-align: center; }
        .battle-table td { vertical-align: top; }
        .crit-row { background-color: #f0f7ff; font-weight: bold; color: #1565c0; text-align: center; }
        .fumb-row { background-color: #fff5f5; font-weight: bold; color: #c2185b; text-align: center; }

        /* ナビゲーションメニュー */
        nav { text-align: center; margin-bottom: 20px; }
        nav a { margin: 0 8px; color: #8261ad; text-decoration: none; font-size: 14px; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        nav a.active { color: #4a148c; border-bottom: 2px solid #4a148c; padding-bottom: 2px; }

        /* バッジ */
        .badge { display: inline-block; padding: 2px 8px; font-size: 12px; font-weight: bold; border-radius: 4px; color: white; margin-right: 5px; }
        .bg-tag { background-color: #9d81ba; }
        .bg-alert { background-color: #c2185b; }

        /* 折りたたみ（狂気表） */
        details { background: #fbf9fe; padding: 15px; border-radius: 8px; border: 1px solid #e1daf0; margin-bottom: 20px; }
        summary { font-size: 15px; font-weight: bold; color: #513971; cursor: pointer; outline: none; padding: 5px 0; }
        summary:hover { color: #8261ad; }
        details ol { margin: 15px 0 5px 0; padding-left: 20px; }
        details li { margin-bottom: 12px; }

        /* 右下のページ内ジャンプメニュー */
        .page-menu {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: #ffffff;
            border: 2px solid #9d81ba;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            max-width: 160px;
        }
        .menu-title {
            font-size: 11px;
            font-weight: bold;
            color: #6c528d;
            text-align: center;
            border-bottom: 1px dashed #b3a2cb;
            padding-bottom: 4px;
            margin-bottom: 6px;
        }
        .page-menu a {
            display: block;
            color: #8261ad;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 6px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .page-menu a:hover {
            background: #f3effa;
            color: #4a148c;
        }

        /* アニメーションの設定 */
        .walking-cat {
            position: fixed;
            bottom: -50px; 
            left: -550px; 
            width: 500px; 
            height: 500px;
            z-index: 1; 
            pointer-events: none;
